<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020408" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f7fb" media="(prefers-color-scheme: light)" />

    <!-- title / description / canonical / og-twitter title|desc|image|url
         are emitted per-page by react-helmet-async via <SEO/>. The static
         pieces below (og:type, og:site_name, og:image dims, twitter:card,
         twitter:site) are constant across all pages so they live here. -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (static parts only) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="xysq.ai" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="xysq.ai — Memory infrastructure for AI" />

    <!-- Twitter Card (static parts only) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@xysqai" />

    <!-- Schema.org: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "xysq",
      "url": "https://xysq.ai",
      "logo": "https://xysq.ai/logo.svg",
      "description": "Memory infrastructure for AI. One memory across every app and agent.",
      "sameAs": [
        "https://x.com/xysqai"
      ]
    }
    </script>

    <!-- Schema.org: WebSite (enables sitelinks searchbox) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "xysq.ai",
      "url": "https://xysq.ai"
    }
    </script>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />

    <!-- DNS prefetch for clickthrough destinations -->
    <link rel="dns-prefetch" href="https://app.xysq.ai" />
    <link rel="dns-prefetch" href="https://docs.xysq.ai" />

    <!-- Fonts: trimmed to weights actually used; print-then-swap pattern keeps the
         stylesheet non-render-blocking while still applying once loaded. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono&display=swap"
      />
    </noscript>

    <!-- Theme: set before render to avoid flash.
         Default is light ("day") per product preference. Honors a
         previously-saved choice if the user has toggled. -->
    <script>
      (function() {
        var t = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8DSV3570ZQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-8DSV3570ZQ');
    </script>
    <!--app-head-->
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
